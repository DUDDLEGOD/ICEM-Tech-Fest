<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechnoFest | ICEM Tech Fest 2026</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icem-logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --stormy-teal: #006466;
            --dark-teal: #065a60;
            --dark-teal-2: #0b525b;
            --dark-teal-3: #144552;
            --charcoal-blue: #1b3a4b;
            --deep-space: #212f45;
            --space-indigo: #272640;
            --midnight-violet: #312244;
            --midnight-violet-2: #3e1f47;
            --deep-purple: #4d194d;
            --bg: #0a0a12;
            --accent: #06b6d4;
        }
        html, body {
            max-width: 100%;
            overflow-x: hidden;
            background-color: var(--bg);
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Manrope', sans-serif;
            color: #f0f0f5;
            margin: 0;
        }
        .font-futuristic { font-family: 'Orbitron', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--stormy-teal); border-radius: 10px; }
        .glass {
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
